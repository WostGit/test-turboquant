name: TurboQuant Honest Test on GitHub M1 Runner (arozanov fork)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-turboquant:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fix build environment (legacy setuptools workaround)
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools==69.5.1" wheel

      - name: Install MLX + mlx-lm
        run: |
          pip install mlx mlx-lm

      - name: Install TurboQuant MLX (arozanov - best fused kernels)
        run: |
          git clone https://github.com/arozanov/turboquant-mlx.git
          cd turboquant-mlx
          pip install . --no-build-isolation   # Critical flag for legacy setup.py

      - name: Baseline Test (FP16 KV Cache)
        run: |
          python - << 'EOF'
          from mlx_lm import load, generate
          import time
          import psutil
          import gc

          def get_mem():
              gc.collect()
              return psutil.Process().memory_info().rss / (1024**2)

          print("=== BASELINE FP16 ===")
          model, tokenizer = load("mlx-community/Qwen2-0.5B-Instruct-4bit", lazy=True)

          prompt = "Agentic coding with long context and history. " * 80
          start_mem = get_mem()
          start = time.time()
          response = generate(model, tokenizer, prompt=prompt, max_tokens=50, verbose=False)
          duration = time.time() - start
          end_mem = get_mem()

          print(f"Time: {duration:.2f}s")
          print(f"Mem delta: {end_mem - start_mem:.1f} MB")
          print(f"Response: {response[:400]}...")
          print("Baseline: OK\n")
          EOF

      - name: TurboQuant Test (3-bit Adaptive)
        run: |
          python - << 'EOF'
          from mlx_lm import load, generate
          from turboquant_mlx import make_adaptive_cache, apply_patch
          import time
          import psutil
          import gc

          def get_mem():
              gc.collect()
              return psutil.Process().memory_info().rss / (1024**2)

          print("=== TURBOQUANT 3-BIT ADAPTIVE ===")
          model, tokenizer = load("mlx-community/Qwen2-0.5B-Instruct-4bit", lazy=True)

          apply_patch()  # Important for integration

          cache = make_adaptive_cache(
              num_layers=len(model.layers),
              bits=3,
              fp16_layers=1   # Protect first/last layer
          )

          prompt = "Agentic coding with long context and history. " * 80
          start_mem = get_mem()
          start = time.time()
          response = generate(model, tokenizer, prompt=prompt, max_tokens=50, verbose=False)
          duration = time.time() - start
          end_mem = get_mem()

          print(f"Time: {duration:.2f}s")
          print(f"Mem delta: {end_mem - start_mem:.1f} MB")
          print(f"Response: {response[:400]}...")
          print("TurboQuant 3-bit: OK (expect real 4-6x savings on larger models)\n")
          EOF

      - name: Summary
        run: |
          echo "=== SUMMARY ==="
          echo "Runner: macos-14 M1 (~7 GB RAM)"
          echo "If both steps complete without error, the arozanov implementation is installed."
          echo "Real value (4.6x compression, near FP16 speed) shows best on 7B+ models with long context."
          echo "On this runner, the test is limited by small model + 7GB RAM."
