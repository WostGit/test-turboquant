name: TurboQuant Real Prompt Test - Qwen 3B (Correct Indentation)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel psutil
          pip install mlx mlx-lm
          git clone https://github.com/rachittshah/mlx-turboquant.git
          cd mlx-turboquant && pip install -e .

      - name: Real Prompt Test with Qwen 3B
        env:
          HF_TOKEN: "dummy_token_to_suppress_warning"
        run: |
          python - << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from mlx_turboquant.cache import TurboQuantKVCache
          import time
          import psutil
          import gc

          def get_mem():
              gc.collect()
              mx.clear_cache()
              return psutil.Process().memory_info().rss / (1024**2)

          print("Loading Qwen2.5-3B-Instruct-4bit...")
          model, tokenizer = load("mlx-community/Qwen2.5-3B-Instruct-4bit", lazy=True)
          print(f"Loaded {len(model.layers)} layers\n")

          messages = [
              {"role": "system", "content": "You are an expert coding assistant working on a large Python project."},
              {"role": "user", "content": "We need to add long-context support using KV cache compression. Please implement a 3-bit TurboQuant style compression layer."}
          ]
          prompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)

          current_sampler = make_sampler(temp=0.6)

          print("=== BASELINE ===")
          start_mem = get_mem()
          start = time.time()
          
          response_baseline = generate(
              model, 
              tokenizer, 
              prompt=prompt, 
              max_tokens=150, 
              verbose=False, 
              sampler=current_sampler
          )
          baseline_time = time.time() - start
          baseline_mem = get_mem() - start_mem

          print(f"Time: {baseline_time:.2f}s | Mem Δ: {baseline_mem:.1f} MB")
          print("Response preview:")
          print(response_baseline[:500])
          print("-" * 80)

          print("\n=== TURBOQUANT 3-BIT ===")
          start_mem = get_mem()
          start = time.time()

          try:
              # Dynamically query dimensions from model configuration
              head_dim = model.args.hidden_size // model.args.num_attention_heads
              print(f"Initializing TurboQuant cache with head_dim={head_dim}...")
              
              cache = [TurboQuantKVCache(bits=3, head_dim=head_dim) for _ in range(len(model.layers))]

              # Warm-up cache
              tokens = mx.array([tokenizer.encode(prompt)])
              # FIXED: Changed back to 'cache=cache' for direct model forward pass
              _ = model(tokens, cache=cache)

              # Generate real response passing the custom cache
              response_tq = generate(
                  model, 
                  tokenizer, 
                  prompt=prompt, 
                  prompt_cache=cache, 
                  max_tokens=150, 
                  verbose=False, 
                  sampler=current_sampler
              )
              tq_time = time.time() - start
              tq_mem = get_mem() - start_mem

              print(f"Time: {tq_time:.2f}s | Mem Δ: {tq_mem:.1f} MB")
              print("Response preview:")
              print(response_tq[:500])
          except Exception as e:
              print(f"TurboQuant failed: {type(e).__name__} - {str(e)[:300]}")

          print("\n=== SUMMARY ===")
          print("Check if the output text makes coherent sense or if 3-bit quantization is simply too lossy for 3B models.")
          EOF
