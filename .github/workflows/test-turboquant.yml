name: TurboQuant Real Limit Benchmark on GitHub M1 Runner

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel psutil
          pip install mlx mlx-lm
          git clone https://github.com/rachittshah/mlx-turboquant.git
          cd mlx-turboquant && pip install -e .

      - name: Run TurboQuant Limit Benchmark
        run: |
          python - << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_turboquant.cache import TurboQuantKVCache
          import time
          import psutil
          import gc

          def get_peak_memory():
              gc.collect()
              mx.metal.clear_cache()
              return psutil.Process().memory_info().rss / (1024 ** 2)

          print("Loading model...")
          model, tokenizer = load("mlx-community/Llama-3.2-1B-Instruct-4bit", lazy=True)
          print(f"Loaded {len(model.layers)} layers\n")

          base_text = "Agentic coding task: analyze this large codebase, maintain full history, use tools, and iterate on fixes. " * 40
          print("=== TURBOQUANT vs BASELINE REAL BENCHMARK ===\n")
          print(f"{'Multiplier':>10} | {'~Tokens':>10} | {'Baseline':>15} | {'TurboQuant 3-bit':>18} | {'Baseline Mem Δ':>15} | {'TQ Mem Δ':>12} | {'Ratio':>8}")
          print("-" * 90)

          results = []
          for mult in [20, 50, 100, 150, 200, 250, 300]:
              prompt = base_text * mult
              token_count = len(tokenizer.encode(prompt))

              # Baseline FP16
              baseline_ok = False
              baseline_mem = None
              try:
                  start_mem = get_peak_memory()
                  start = time.time()
                  _ = generate(model, tokenizer, prompt=prompt, max_tokens=50, verbose=False)
                  baseline_mem = get_peak_memory() - start_mem
                  baseline_ok = True
                  b_status = "OK"
              except Exception as e:
                  b_status = f"FAIL ({type(e).__name__})"

              # TurboQuant 3-bit
              tq_ok = False
              tq_mem = None
              try:
                  cache = [TurboQuantKVCache(bits=3, head_dim=64) for _ in range(len(model.layers))]
                  start_mem = get_peak_memory()
                  start = time.time()
                  _ = generate(model, tokenizer, prompt=prompt, max_tokens=50, verbose=False, cache=cache)  # Note: may need patch for full support
                  tq_mem = get_peak_memory() - start_mem
                  tq_ok = True
                  tq_status = "OK"
              except Exception as e:
                  tq_status = f"FAIL ({type(e).__name__})"

              ratio = f"{baseline_mem / tq_mem:.1f}x" if baseline_mem and tq_mem and tq_mem > 0 else "N/A"

              print(f"{mult:10} | {token_count:10} | {b_status:15} | {tq_status:18} | {baseline_mem or 'N/A':14.1f} | {tq_mem or 'N/A':12.1f} | {ratio:8}")

              results.append((mult, token_count, baseline_ok, tq_ok, baseline_mem, tq_mem))

              if not tq_ok:
                  print("TurboQuant hit limit.")
                  break

          print("\n=== FINAL HARSH SUMMARY ===")
          max_b = max((r[1] for r in results if r[2]), default=0)
          max_tq = max((r[1] for r in results if r[3]), default=0)
          print(f"Baseline viable context: ~{max_b:,} tokens")
          print(f"TurboQuant viable context: ~{max_tq:,} tokens")
          print(f"Context improvement: {max_tq / max_b:.1f}x (if >1.0)")
          print("If TurboQuant shows significantly lower memory delta while maintaining OK status at higher multipliers, it delivers value for agentic coding.")
          print("Negative or near-zero ratios indicate measurement issues or no real compression benefit in this setup.")
          EOF
