name: TurboQuant Real Prompt Test - Qwen (Correct Indentation)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel psutil
          pip install mlx mlx-lm
          git clone https://github.com/rachittshah/mlx-turboquant.git
          cd mlx-turboquant && pip install -e .

      - name: Real Prompt Test with Qwen2-1.5B
        env:
          HF_TOKEN: "dummy_token_to_suppress_warning"
        run: |
          python - << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_turboquant.cache import TurboQuantKVCache
          import time
          import psutil
          import gc

          def get_mem():
              gc.collect()
              mx.clear_cache()
              return psutil.Process().memory_info().rss / (1024**2)

          # 1. FIXED: Loading the actual FP16 model for a true baseline
          print("Loading Qwen2-1.5B-Instruct (FP16)...")
          model, tokenizer = load("mlx-community/Qwen2-1.5B-Instruct", lazy=True)
          print(f"Loaded {len(model.layers)} layers\n")

          # 2. FIXED: Applying Chat Template to stop infinite repetition loops
          messages = [
              {"role": "system", "content": "You are an expert coding assistant working on a large Python project."},
              {"role": "user", "content": "We need to add long-context support using KV cache compression. Please implement a 3-bit TurboQuant style compression layer and explain the main trade-offs for agentic coding workflows."}
          ]
          prompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)

          # Common generation kwargs to ensure creative, non-looping output
          gen_kwargs = {
              "max_tokens": 250, 
              "verbose": False, 
              "temp": 0.7, 
              "repetition_penalty": 1.1
          }

          print("=== BASELINE FP16 ===")
          start_mem = get_mem()
          start = time.time()
          response_baseline = generate(model, tokenizer, prompt=prompt, **gen_kwargs)
          baseline_time = time.time() - start
          baseline_mem = get_mem() - start_mem

          print(f"Time: {baseline_time:.2f}s | Mem Δ: {baseline_mem:.1f} MB")
          print("Response preview:")
          print(response_baseline[:700])
          print("-" * 80)

          print("\n=== TURBOQUANT 3-BIT ===")
          start_mem = get_mem()
          start = time.time()

          try:
              # Dynamically query dimensions from model configuration
              head_dim = model.args.hidden_size // model.args.num_attention_heads
              print(f"Initializing TurboQuant cache with head_dim={head_dim}...")
              
              cache = [TurboQuantKVCache(bits=3, head_dim=head_dim) for _ in range(len(model.layers))]

              # Warm-up cache
              tokens = mx.array([tokenizer.encode(prompt)])
              _ = model(tokens, cache=cache)

              # Generate real response
              response_tq = generate(model, tokenizer, prompt=prompt, cache=cache, **gen_kwargs)
              tq_time = time.time() - start
              tq_mem = get_mem() - start_mem

              print(f"Time: {tq_time:.2f}s | Mem Δ: {tq_mem:.1f} MB")
              print("Response preview:")
              print(response_tq[:700])
          except Exception as e:
              print(f"TurboQuant failed: {type(e).__name__} - {str(e)[:300]}")

          print("\n=== SUMMARY ===")
          print("Compare coherence and usefulness of both responses.")
          print("If TurboQuant response is similar in quality but uses significantly less memory, it is working.")
          print("If it crashes with matmul error, the fork has compatibility issues with this Qwen model.")
          EOF
