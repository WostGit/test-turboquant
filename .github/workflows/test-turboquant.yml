name: TurboQuant Limit Test on GitHub M1 Runner

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark-turboquant:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel psutil
          pip install mlx mlx-lm
          git clone https://github.com/rachittshah/mlx-turboquant.git
          cd mlx-turboquant && pip install -e .

      - name: TurboQuant Limit Benchmark
        run: |
          python - << 'EOF'
          import mlx.core as mx
          from mlx_lm import load
          from mlx_turboquant.cache import TurboQuantKVCache
          import time
          import psutil
          import gc

          def get_memory_mb():
              gc.collect()
              return psutil.Process().memory_info().rss / (1024 ** 2)

          model_name = "mlx-community/Llama-3.2-1B-Instruct-4bit"
          print(f"Loading model: {model_name}")
          model, tokenizer = load(model_name, lazy=True)
          print(f"Model loaded with {len(model.layers)} layers\n")

          base_prompt = "KV cache compression for long-context agentic coding on memory-limited GitHub M1 runner with large codebases and multi-turn history. " * 50

          print("=== TURBOQUANT vs BASELINE LIMIT TEST ===\n")
          print("Context multiplier | Approx tokens | Baseline Status | TurboQuant Status | Baseline Mem (MB) | TQ Mem (MB) | Compression Ratio")

          results = []
          for multiplier in [10, 50, 100, 200, 300, 400, 500]:
              prompt = base_prompt * multiplier
              tokens = len(tokenizer.encode(prompt))
              print(f"\nTesting multiplier x{multiplier} (~{tokens} tokens)...")

              # Baseline (FP16 KV Cache)
              baseline_mem = None
              baseline_ok = False
              try:
                  start_mem = get_memory_mb()
                  start = time.time()
                  response = model(mx.array([tokenizer.encode(prompt)]), cache=None)  # simple forward
                  duration = time.time() - start
                  end_mem = get_memory_mb()
                  baseline_mem = end_mem - start_mem
                  baseline_ok = True
                  status_b = "OK"
              except Exception as e:
                  status_b = f"FAILED ({type(e).__name__})"

              # TurboQuant 3-bit
              tq_mem = None
              tq_ok = False
              try:
                  head_dim = 64  # for Llama-3.2-1B
                  cache = [TurboQuantKVCache(bits=3, head_dim=head_dim) for _ in range(len(model.layers))]

                  start_mem = get_memory_mb()
                  start = time.time()
                  tokens_tensor = mx.array([tokenizer.encode(prompt)])
                  logits = model(tokens_tensor, cache=cache)
                  duration = time.time() - start
                  end_mem = get_memory_mb()
                  tq_mem = end_mem - start_mem
                  tq_ok = True
                  status_tq = "OK"
              except Exception as e:
                  status_tq = f"FAILED ({type(e).__name__})"

              ratio = f"{baseline_mem / tq_mem:.1f}x" if baseline_mem and tq_mem else "N/A"

              print(f"{multiplier:17} | {tokens:12} | {status_b:15} | {status_tq:15} | {baseline_mem or 'N/A':14} | {tq_mem or 'N/A':12} | {ratio}")

              results.append((multiplier, tokens, baseline_ok, tq_ok, baseline_mem, tq_mem))

              if not tq_ok and not baseline_ok:
                  print("Both failed - hitting hard memory limit.")
                  break

          print("\n=== FINAL SUMMARY ===")
          print("On GitHub M1 runner (~7 GB RAM):")
          max_baseline = max((r[1] for r in results if r[2]), default=0)
          max_tq = max((r[1] for r in results if r[3]), default=0)
          print(f"Baseline max viable context: ~{max_baseline} tokens")
          print(f"TurboQuant max viable context: ~{max_tq} tokens")
          print(f"Improvement: {max_tq / max_baseline:.1f}x longer context (if any)")
          print("This directly shows what TurboQuant enables for agentic coding workflows.")
          EOF
