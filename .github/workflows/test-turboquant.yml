name: TurboQuant Honest Benchmark on GitHub M1 Runner

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel psutil
          pip install mlx mlx-lm
          git clone https://github.com/rachittshah/mlx-turboquant.git
          cd mlx-turboquant && pip install -e .

      - name: Honest TurboQuant Benchmark
        run: |
          python - << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_turboquant.cache import TurboQuantKVCache
          import time
          import psutil
          import gc

          def get_memory_mb():
              gc.collect()
              mx.clear_cache()
              return psutil.Process().memory_info().rss / (1024 ** 2)

          print("Loading model...")
          model, tokenizer = load("mlx-community/Qwen2-0.5B-Instruct-4bit", lazy=True)
          print(f"Loaded {len(model.layers)} layers\n")

          base_text = "Agentic coding task with large context and history. " * 15

          print("Mult | ~Tokens | Baseline | TQ 3-bit | Base Mem | TQ Mem | Ratio")
          print("-" * 70)

          for mult in [20, 50, 80, 120]:
              prompt = base_text * mult
              token_count = len(tokenizer.encode(prompt))

              # Baseline
              b_mem = 0.0
              try:
                  start = get_memory_mb()
                  _ = generate(model, tokenizer, prompt=prompt, max_tokens=20, verbose=False)
                  b_mem = get_memory_mb() - start
                  b_status = "OK"
              except:
                  b_status = "FAIL"

              # TurboQuant
              tq_mem = 0.0
              try:
                  cache = [TurboQuantKVCache(bits=3, head_dim=64) for _ in range(len(model.layers))]
                  start = get_memory_mb()
                  tokens = mx.array([tokenizer.encode(prompt)])
                  _ = model(tokens, cache=cache)
                  tq_mem = get_memory_mb() - start
                  tq_status = "OK"
              except:
                  tq_status = "FAIL"

              ratio = f"{b_mem / tq_mem:.1f}x" if tq_mem > 0 else "N/A"

              print(f"{mult:4} | {token_count:7} | {b_status:8} | {tq_status:8} | {b_mem:8.1f} | {tq_mem:8.1f} | {ratio:8}")

          print("\nHarsh verdict: If TQ Mem is not consistently much lower than Base Mem, TurboQuant is not delivering compression here.")
          EOF
