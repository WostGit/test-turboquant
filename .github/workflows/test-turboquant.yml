name: TurboQuant Test on GitHub M1 Runner (Minimal Working)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlx mlx-lm psutil
          git clone https://github.com/rachittshah/mlx-turboquant.git
          cd mlx-turboquant && pip install -e .

      - name: Quick TurboQuant Test
        run: |
          python - << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_turboquant.cache import TurboQuantKVCache
          import time
          import psutil
          import gc

          def get_mem():
              gc.collect()
              mx.clear_cache()
              return psutil.Process().memory_info().rss / (1024**2)

          print("=== QUICK TURBOQUANT TEST ===")
          model, tokenizer = load("mlx-community/Qwen2-0.5B-Instruct-4bit", lazy=True)

          prompt = "Long context agentic coding test on GitHub M1 runner. " * 100

          # Baseline
          start = get_mem()
          t0 = time.time()
          _ = generate(model, tokenizer, prompt=prompt, max_tokens=30, verbose=False)
          baseline_time = time.time() - t0
          baseline_mem = get_mem() - start
          print(f"Baseline - Time: {baseline_time:.2f}s | Mem Δ: {baseline_mem:.1f} MB")

          # TurboQuant
          start = get_mem()
          t0 = time.time()
          cache = [TurboQuantKVCache(bits=3, head_dim=64) for _ in range(len(model.layers))]
          tokens = mx.array([tokenizer.encode(prompt)])
          _ = model(tokens, cache=cache)
          tq_time = time.time() - t0
          tq_mem = get_mem() - start
          print(f"TurboQuant - Time: {tq_time:.2f}s | Mem Δ: {tq_mem:.1f} MB")

          print(f"\nRatio: {baseline_mem / tq_mem:.2f}x" if tq_mem > 0 else "\nRatio: N/A")
          print("Note: On this runner with small model, real 4-6x compression is hard to observe.")
          EOF
