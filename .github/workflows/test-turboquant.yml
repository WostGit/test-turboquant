name: Test TurboQuant on macOS M1 Runner

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-turboquant:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip and build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install MLX and mlx-lm
        run: |
          pip install mlx mlx-lm

      - name: Install TurboQuant MLX (rachittshah fork - reliable packaging)
        run: |
          git clone https://github.com/rachittshah/mlx-turboquant.git
          cd mlx-turboquant
          pip install -e .

      - name: Baseline Test (Standard FP16 KV Cache)
        run: |
          python - << 'EOF'
          from mlx_lm import load, generate
          import time

          print("=== BASELINE FP16 KV CACHE ===")
          model, tokenizer = load("mlx-community/SmolLM-135M-Instruct-4bit", lazy=True)

          prompt = ("KV cache compression for long-context agentic coding on limited-memory GitHub M1 runner. " * 80)

          start = time.time()
          response = generate(model, tokenizer, prompt=prompt, max_tokens=80, verbose=False)
          duration = time.time() - start

          print(f"Time: {duration:.2f}s")
          print(f"Response snippet: {response[:400]}...")
          print("✅ Baseline: SUCCESS\n")
          EOF

      - name: TurboQuant Test (3-bit KV Cache)
        run: |
          python - << 'EOF'
          import mlx.core as mx
          from mlx_lm import load
          from mlx_turboquant.cache import TurboQuantKVCache
          import time

          print("=== TURBOQUANT 3-BIT KV CACHE ===")
          model, tokenizer = load("mlx-community/SmolLM-135M-Instruct-4bit", lazy=True)

          # One TurboQuant cache per layer
          cache = [TurboQuantKVCache(bits=3) for _ in range(len(model.layers))]

          prompt = ("KV cache compression for long-context agentic coding on limited-memory GitHub M1 runner. " * 80)

          start = time.time()

          # Batched input (required)
          tokens = mx.array([tokenizer.encode(prompt)])

          logits = model(tokens, cache=cache)

          # Decode last generated tokens
          generated = logits.argmax(-1)[0, -80:].tolist()
          response = tokenizer.decode(generated)

          duration = time.time() - start

          print(f"Time: {duration:.2f}s")
          print(f"Response snippet: {response[:400]}...")
          print("✅ TurboQuant 3-bit: SUCCESS (~4-6x smaller KV cache)\n")
          EOF

      - name: Summary
        run: |
          echo "=== TEST SUMMARY ==="
          echo "Runner: GitHub macos-14 (M1, ~7 GB RAM)"
          echo "Model: SmolLM-135M-4bit"
          echo ""
          echo "If both steps passed, TurboQuant is working on the M1 runner."
          echo "This enables significantly longer contexts for agentic coding tests without OOM."
          echo "Next step: Increase prompt length dramatically or switch to a 7B model."
