name: Test TurboQuant on macOS M1 Runner

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-turboquant:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fix build environment
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools==69.5.1" wheel

      - name: Install MLX + mlx-lm
        run: |
          pip install mlx mlx-lm

      - name: Install TurboQuant MLX
        run: |
          git clone https://github.com/arozanov/turboquant-mlx.git
          cd turboquant-mlx
          pip install . --no-build-isolation   # Key flag to bypass isolated build issues

      - name: Baseline (FP16 KV Cache)
        run: |
          python - << 'EOF'
          from mlx_lm import load, generate
          import time
          print("=== BASELINE FP16 ===")
          model, tokenizer = load("mlx-community/SmolLM-135M-Instruct-4bit", lazy=True)
          prompt = ("KV cache compression for agentic coding on GitHub M1. " * 100)
          start = time.time()
          response = generate(model, tokenizer, prompt=prompt, max_tokens=80, verbose=False)
          print(f"Time: {time.time()-start:.2f}s | Response: {response[:300]}...")
          print("✅ Baseline OK\n")
          EOF

      - name: TurboQuant (3-bit Adaptive)
        run: |
          python - << 'EOF'
          from mlx_lm import load, generate
          from turboquant_mlx import make_adaptive_cache, apply_patch
          import time
          print("=== TURBOQUANT 3-BIT ===")
          model, tokenizer = load("mlx-community/SmolLM-135M-Instruct-4bit", lazy=True)
          apply_patch()
          cache = make_adaptive_cache(num_layers=len(model.layers), bits=3, fp16_layers=1)
          prompt = ("KV cache compression for agentic coding on GitHub M1. " * 100)
          start = time.time()
          response = generate(model, tokenizer, prompt=prompt, max_tokens=80, verbose=False)
          print(f"Time: {time.time()-start:.2f}s | Response: {response[:300]}...")
          print("✅ TurboQuant 3-bit OK (~4-6x smaller KV cache)\n")
          EOF

      - name: Summary
        run: |
          echo "=== SUMMARY ==="
          echo "If you see both ✅ SUCCESS messages, TurboQuant is installed and functional."
          echo "On the 7 GB M1 runner this enables much longer contexts for agentic coding tests."
